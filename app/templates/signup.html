<!DOCTYPE html>
<html lang="en">
<head>
    <title>Signup - Task Manager</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.svg') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>
    
    <div class="auth-wrapper">
        <div class="logo-icon"><i data-lucide="shield-check"></i></div>
        <h2>Sign Up</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/signup" method="POST">
            <input type="text" name="username" class="glass-input" placeholder="Username" required autocomplete="off">
            <input type="email" name="email" class="glass-input" placeholder="Email" required autocomplete="off">
            <input type="password" name="password" class="glass-input" placeholder="Password" required>
            <button type="submit" class="btn-primary" style="width:100%; margin-top:10px;">Sign Up</button>
        </form>

        <div class="auth-links">
            <p>Already have an account? <a href="/login">Login</a></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='theme.js') }}"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
